services:
  postgres:
    image: postgres:17-alpine
    container_name: modern-edu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: modern_edu
    ports:
      - "5432:5432"
    volumes:
      - modern_edu_postgres_data:/var/lib/postgresql/data

volumes:
  modern_edu_postgres_data:
