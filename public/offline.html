<!doctype html>
<html lang="uz-Latn-UZ">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Edu</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f7f8f5;
        color: #13201a;
        display: grid;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        border: 1px solid #d8ded6;
        border-radius: 24px;
        box-shadow: 0 18px 50px rgba(15, 35, 28, 0.12);
        margin: auto;
        max-width: 520px;
        padding: 28px;
      }

      h1 {
        font-size: 28px;
        margin: 0;
      }

      p {
        color: #5b6a62;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aloqa uzildi</h1>
      <p>Internet qayta ulangach sahifani yangilang. Xavfsizlik uchun shaxsiy dars ma'lumotlari qurilmaga saqlanmaydi.</p>
    </main>
  </body>
</html>
